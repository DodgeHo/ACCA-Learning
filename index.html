<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>题库入口</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f7f7f8;
      }

      .card {
        text-align: center;
        padding: 28px;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        width: min(92vw, 520px);
      }

      h1 {
        margin: 0 0 14px;
        font-size: 22px;
      }

      p {
        margin: 0 0 18px;
        color: #475569;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .entry {
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 16px;
        cursor: pointer;
        background: #f8fafc;
        color: #0f172a;
        text-decoration: none;
        font-weight: 600;
      }

      .entry:hover {
        background: #eef2ff;
        border-color: #c7d2fe;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>题库入口</h1>
      <p>选择你要进入的 ACCA 科目</p>
      <div class="grid">
        <a class="entry" href="/pm/">进入 PM 练习</a>
        <a class="entry" href="/tx/">进入 TX 练习</a>
        <a class="entry" href="/fr/">进入 FR 练习</a>
        <a class="entry" href="/aa/">进入 AA 练习</a>
        <a class="entry" href="/fm/">进入 FM 练习</a>
        <a class="entry" href="/sbl/">进入 SBL 练习</a>
        <a class="entry" href="/sbr/">进入 SBR 练习</a>
        <a class="entry" href="/afm/">进入 AFM 练习</a>
        <a class="entry" href="/apm/">进入 APM 练习</a>
        <a class="entry" href="/aaa/">进入 AAA 练习</a>
      </div>
    </main>
  </body>
</html>
