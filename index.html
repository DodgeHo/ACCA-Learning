<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>题库入口</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f7f7f8;
      }

      .card {
        text-align: center;
        padding: 24px;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 16px;
        cursor: pointer;
        background: #0f172a;
        color: #ffffff;
      }

      button:hover {
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>题库入口</h1>
      <button type="button" onclick="window.location.href='/saa/';">
        进入 SAA 练习
      </button>
    </main>
  </body>
</html>
